<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធតាមដានការងារ</title>
    <style>
        /* Base Styles */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; table-layout: fixed; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; word-wrap: break-word; }
        th { background-color: #2980b9; color: white; }

        /* Form Elements */
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #2980b9; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="project-view">
        <h2>បញ្ជី Project</h2>
        <button onclick="toggleProjectForm()">New_Project</button>
        <div id="project-form-container" style="display: none; margin-top: 10px;">
            <input type="text" id="new_project_id" placeholder="Project ID">
            <input type="date" id="new_project_date">
            <button onclick="createProject()">រក្សាទុក</button>
        </div>
        <div id="project-list"></div>
    </div>

    <div id="task-view" style="display:none;">
        <button onclick="showProjects()">⬅️ ត្រឡប់ក្រោយ</button>
        <h2 id="current-project-title"></h2>
        <table>
            <thead>
                <tr><th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th><th>Action</th></tr>
            </thead>
            <tbody id="task-table-body"></tbody>
            <tr id="new-task-row" style="display:none; background-color: #f9f9f9;">
                <td><input type="text" id="new-no"></td>
                <td><input type="text" id="new-description"></td>
                <td>
                    <select id="new-status">
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Done">Done</option>
                    </select>
                </td>
                <td><input type="date" id="new-date"></td>
                <td><input type="text" id="new-note"></td>
            </tr>
        </table>
        <button onclick="toggleNewRow()" id="plus-btn">+</button>
        <button onclick="saveNewTask()" id="save-btn" style="display:none; background-color: #27ae60;">Save/Update</button>
    </div>
</div>

<script>
    let activeProjectId = '';
    let currentTasks = [];

    // ស្តង់ដារមុខងារផ្ទុកទិន្នន័យ
    async function loadProjects() {
        const res = await fetch('/get_projects');
        const data = await res.json();
        const list = document.getElementById('project-list');
        list.innerHTML = '';
        
        for (const p of data.projects) {
            // ... (Logic ដូចដើម)
        }
    }

    // មុខងារសម្រាប់ Sort ទិន្នន័យ
    function sortTasks(tasks) {
        return tasks.sort((a, b) => {
            if (a.status === 'Done' && b.status !== 'Done') return -1;
            if (a.status !== 'Done' && b.status === 'Done') return 1;
            return parseInt(a.no) - parseInt(b.no);
        });
    }

    window.onload = loadProjects;
// ពេលបង្ហាញទិន្នន័យក្នុងតារាង
taskRow.innerHTML = `
    <td>${task.no}</td>
    <td>${task.description}</td>
    ...
    <button onclick="editTask('${task.id}')">Edit</button>
`;

// មុខងារ Save/Update នៅ Frontend
    async function saveNewTask() {
        const data = {
            id: editingTaskId, // បើ null គឺបង្កើតថ្មី បើមានលេខ គឺ Update
            project_id: activeProjectId,
            no: document.getElementById('new-no').value,
            description: document.getElementById('new-description').value,
            // ... ផ្សេងៗទៀត
        };

        const endpoint = editingTaskId ? '/update_task' : '/tasks';
        
        await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        loadTasks(); // ផ្ទុកទិន្នន័យឡើងវិញ
    }

</script>
</body>
</html>
