<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker</title>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
padding:10px
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:15px;
border-radius:8px
}

table{
width:100%;
border-collapse:collapse;
font-size:14px
}

th,td{
padding:8px;
border:1px solid #ddd
}

th{
background:#2980b9;
color:white
}

#task-view th:nth-child(1){width:60px}
#task-view th:nth-child(6){width:160px}

button{
border:none;
border-radius:4px;
padding:6px 10px;
cursor:pointer
}

.edit{background:#2980b9;color:white}
.delete{background:#e74c3c;color:white}
.add{background:#27ae60;color:white;width:100%;margin-top:10px}

.status-Done{color:green;font-weight:bold}
.status-Pending{color:red}
.status-Processing{color:#f39c12}

.action-buttons button{
margin-right:5px
}

input,select{
width:100%;
padding:6px;
border:1px solid #ccc;
border-radius:4px
}

</style>
</head>

<body>

<div class="container">

<div id="project-view">

<h2>Projects</h2>

<button onclick="toggleProjectForm()">New Project</button>

<div id="project-form-container" style="display:none">

<input id="new_project_id" placeholder="Project ID">
<input type="date" id="new_project_date">

<button onclick="createProject()">Save</button>

</div>

<div id="project-list"></div>

</div>

<div id="task-view" style="display:none">

<button onclick="showProjects()">⬅ Back</button>

<h3 id="current-project-title"></h3>

<table>

<thead>
<tr>
<th>No</th>
<th>Desc</th>
<th>Status</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>

<tbody id="task-table-body"></tbody>

<tr id="new-task-row" style="display:none;background:#f9f9f9">

<td><input id="new-no" readonly></td>

<td><input id="new-description"></td>

<td>
<select id="new-status">
<option>Pending</option>
<option>Processing</option>
<option>Done</option>
</select>
</td>

<td><input type="date" id="new-date"></td>

<td><input id="new-note"></td>

<td></td>

</tr>

</table>

<button class="add" onclick="toggleNewRow()" id="plus-btn">
+ Add Task
</button>

<button class="add" onclick="saveTask()" id="save-btn" style="display:none">
Save
</button>

</div>

</div>

<script>

let activeProjectId=''
let currentTasks=[]
let editingId=null

async function loadProjects(){

const res=await fetch('/get_projects')
const data=await res.json()

const list=document.getElementById('project-list')

list.innerHTML=''

for(const p of data.projects){

const taskRes=await fetch(`/tasks?project_id=${p.id}`)
const taskData=await taskRes.json()

const card=document.createElement('div')

card.style.border="1px solid #ddd"
card.style.padding="10px"
card.style.marginTop="10px"
card.style.cursor="pointer"

card.onclick=()=>openProject(p.id)

card.innerHTML=`<b>${p.id}</b><br>Date: ${p.date}`

list.appendChild(card)

}

}

async function openProject(id){

activeProjectId=id

document.getElementById('project-view').style.display='none'
document.getElementById('task-view').style.display='block'

document.getElementById('current-project-title').innerText="Sub: "+id

const res=await fetch(`/tasks?project_id=${id}`)
const data=await res.json()

currentTasks=data.tasks||[]

sortRender()

}

function sortRender(){

currentTasks.sort((a,b)=>parseInt(a.no)-parseInt(b.no))

const tbody=document.getElementById('task-table-body')

tbody.innerHTML=currentTasks.map(t=>`

<tr>

<td>${t.no}</td>

<td>${t.description}</td>

<td class="status-${t.status}">${t.status}</td>

<td>${t.date||''}</td>

<td>${t.note||''}</td>

<td class="action-buttons">

<button class="edit" onclick="editTask('${t.id}')">
Edit
</button>

<button class="delete" onclick="deleteTask('${t.id}')">
Delete
</button>

</td>

</tr>

`).join('')

}

function toggleNewRow(){

document.getElementById('new-task-row').style.display='table-row'
document.getElementById('plus-btn').style.display='none'
document.getElementById('save-btn').style.display='inline'

let max=0

currentTasks.forEach(t=>{
const n=parseInt(t.no)
if(n>max)max=n
})

document.getElementById('new-no').value=
String(max+1).padStart(2,'0')

}

function editTask(id){

const t=currentTasks.find(x=>x.id===id)

if(!t)return

editingId=id

toggleNewRow()

document.getElementById('new-no').value=t.no
document.getElementById('new-description').value=t.description
document.getElementById('new-status').value=t.status
document.getElementById('new-date').value=t.date
document.getElementById('new-note').value=t.note

}

async function saveTask(){

const payload={

id:editingId,
project_id:activeProjectId,
no:document.getElementById('new-no').value,
description:document.getElementById('new-description').value,
status:document.getElementById('new-status').value,
date:document.getElementById('new-date').value,
note:document.getElementById('new-note').value

}

await fetch('/tasks',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)
})

editingId=null

document.getElementById('new-task-row').style.display='none'
document.getElementById('save-btn').style.display='none'
document.getElementById('plus-btn').style.display='inline'

openProject(activeProjectId)

}

async function deleteTask(id){

if(!confirm("Delete this task?")) return

await fetch(`/tasks/${id}`,{
method:'DELETE'
})

openProject(activeProjectId)

}

function showProjects(){

document.getElementById('project-view').style.display='block'
document.getElementById('task-view').style.display='none'

}

function toggleProjectForm(){

const f=document.getElementById('project-form-container')

f.style.display=
f.style.display==='none'?'block':'none'

}

async function createProject(){

await fetch('/projects',{

method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({

id:document.getElementById('new_project_id').value,
date:document.getElementById('new_project_date').value

})

})

loadProjects()

toggleProjectForm()

}

window.onload=loadProjects

</script>

</body>
</html>
