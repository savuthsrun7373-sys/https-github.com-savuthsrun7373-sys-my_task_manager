<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធតាមដានការងារ</title>
    <style>
        /* CSS សម្រាប់ភាពស្អាតលើទូរសព្ទ */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* Grid សម្រាប់ Project */
        #project-list { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .project-card { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .project-card:hover { border-color: #2980b9; }

        /* តារាង និង Form */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2980b9; color: white; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #2980b9; color: white; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="project-view">
        <h2>បញ្ជី Project</h2>
        <button onclick="toggleProjectForm()">New_Project</button>
        <div id="project-form-container" style="display: none; margin-top: 10px;">
            <input type="text" id="new_project_id" placeholder="Project ID">
            <input type="date" id="new_project_date">
            <button onclick="createProject()">រក្សាទុក</button>
        </div>
        <div id="project-list"></div>
    </div>

    <div id="task-view" style="display:none;">
        <button onclick="showProjects()">⬅️ ត្រឡប់ក្រោយ</button>
        <h2 id="current-project-title"></h2>
        
        <form id="task-form">
            <input type="text" id="no" placeholder="No" required>
            <input type="text" id="description" placeholder="Description" required>
            <select id="status">
                <option value="Pending">Pending</option>
                <option value="Processing">Processing</option>
                <option value="Done">Done</option>
            </select>
            <input type="date" id="date_project" required>
            <input type="text" id="note" placeholder="Note">
            <button type="submit">បន្ថែមការងារ</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th>
                </tr>
            </thead>
            <tbody id="task-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let activeProjectId = '';

    // ទាញយក Project
    async function loadProjects() {
        const res = await fetch('/get_projects');
        const data = await res.json();
        const list = document.getElementById('project-list');
        list.innerHTML = '';
        
        for (const p of data.projects) {
            const taskRes = await fetch(`/tasks?project_id=${p.id}`);
            const taskData = await taskRes.json();
            
            // ក្នុង loop នៃ loadProjects
            let taskRows = '';
            if (taskData.tasks && taskData.tasks.length > 0) {
                // កែសម្រួលនៅក្នុង loop នៃ loadProjects ក្នុង index.html
                taskRows = taskData.tasks.map(t => {
                    // ពិនិត្យមើលតម្លៃ date_project ដែលមកពី Backend
                    let displayDate = t.date_project ? t.date_project : 'N/A';
                    
                    // បើសិនជាទម្រង់ YYYY-MM-DD ចង់ប្តូរជា DD-MM-YYYY
                    if (displayDate !== 'N/A' && displayDate.includes('-')) {
                        const p = displayDate.split('-');
                        if (p.length === 3) displayDate = `${p[2]}-${p[1]}-${p[0]}`;
                    }

                    return `<tr>
                        <td>${t.no || ''}</td>
                        <td>${t.description || ''}</td>
                        <td>${t.status || ''}</td>
                        <td>${displayDate}</td>
                        <td>${t.note || ''}</td>
                    </tr>`;
                }).join('');

            } else {
                taskRows = '<tr><td colspan="5">មិនមាន Task</td></tr>';
            }

            const card = document.createElement('div');
            card.className = 'project-card';
            card.dataset.projectId = p.id; 
            card.onclick = function() { openProject(this.dataset.projectId); };

            card.innerHTML = `
                <h3>Sub: ${p.id}</h3>
                <p>កាលបរិច្ឆេទ: ${p.date || 'N/A'}</p>
                <table style="pointer-events: none; font-size: 12px;"> 
                    <thead>
                        <tr>
                            <th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th>
                        </tr>
                    </thead>
                    <tbody>${taskRows}</tbody>
                </table>
            `;
            list.appendChild(card);
        }
    }

    // បើក Project View
    // កែសម្រួលផ្នែក openProject ក្នុង index.html
    async function openProject(id) {
        activeProjectId = id;
        document.getElementById('project-view').style.display = 'none';
        document.getElementById('task-view').style.display = 'block';
        document.getElementById('current-project-title').innerText = "Sub: " + id; // ដូរពី Project ទៅ Sub
        
        const res = await fetch(`/tasks?project_id=${id}`);
        const data = await res.json();
        
        const tbody = document.getElementById('task-table-body');
        tbody.innerHTML = ''; 

        const taskList = data.tasks; 

        if (taskList && taskList.length > 0) {
            taskList.forEach(t => {
                // បន្ថែម date_project និង note នៅទីនេះ
                tbody.innerHTML += `<tr>
                    <td>${t.no || ''}</td>
                    <td>${t.description || ''}</td>
                    <td>${t.status || ''}</td>
                    <td>${t.date_project || ''}</td>
                    <td>${t.note || ''}</td>
                </tr>`;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="5">មិនមានទិន្នន័យការងារទេ</td></tr>';
        }
    }

    // បន្ថែម Task
    document.getElementById('task-form').onsubmit = async (e) => {
        e.preventDefault();
        // កែសម្រួលចំណុចនេះក្នុង index.html
        const payload = {
            project_id: activeProjectId,
            no: document.getElementById('no').value,
            description: document.getElementById('description').value,
            status: document.getElementById('status').value,
            date_project: document.getElementById('date_project').value, // ត្រូវប្រាកដថា ID នេះមានក្នុង HTML
            note: document.getElementById('note').value
        };
        await fetch('/tasks', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(payload) 
        });
        openProject(activeProjectId);
        document.getElementById('task-form').reset();
    };

    function showProjects() {
        document.getElementById('project-view').style.display = 'block';
        document.getElementById('task-view').style.display = 'none';
    }

    function toggleProjectForm() {
        const f = document.getElementById('project-form-container');
        f.style.display = (f.style.display === 'none') ? 'block' : 'none';
    }

    async function createProject() {
        const id = document.getElementById('new_project_id').value;
        const date = document.getElementById('new_project_date').value;
        await fetch('/projects', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, date}) });
        loadProjects();
        toggleProjectForm();
    }

    window.onload = loadProjects;
</script>
</body>
</html>
