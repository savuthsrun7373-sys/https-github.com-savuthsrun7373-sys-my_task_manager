<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធតាមដានការងារ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { width: 95%; max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; table-layout: auto; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2980b9; color: white; }
        #project-list { display: grid; gap: 10px; margin-top: 20px; }
        .project-card { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; width: 100%; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #2980b9; color: white; border: none; cursor: pointer; }
        .action-btns { display: flex; gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div id="project-view">
        <h2>បញ្ជី Project</h2>
        <button onclick="toggleProjectForm()">+ New Project</button>
        <div id="project-form-container" style="display: none; margin-top: 10px;">
            <input type="text" id="new_project_id" placeholder="Project ID">
            <input type="date" id="new_project_date">
            <button onclick="createProject()" style="background-color: #27ae60;">រក្សាទុក Project</button>
        </div>
        <div id="project-list"></div>
    </div>

    <div id="task-view" style="display:none;">
        <button onclick="showProjects()">⬅️ ត្រឡប់ក្រោយ</button>
        <h2 id="current-project-title"></h2>
        <table>
            <thead>
                <tr><th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th><th>Action</th></tr>
            </thead>
            <tbody id="task-table-body"></tbody>
            <tr id="input-row" style="display:none; background-color: #e8f4fd;">
                <td><input type="text" id="task-no" placeholder="No"></td>
                <td><input type="text" id="task-desc" placeholder="Description"></td>
                <td>
                    <select id="task-status">
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Done">Done</option>
                    </select>
                </td>
                <td><input type="date" id="task-date"></td>
                <td><input type="text" id="task-note" placeholder="Note"></td>
                <td><button onclick="saveTask()" style="background-color: #27ae60;">Save</button></td>
            </tr>
        </table>
        
        <div class="action-btns">
            <button onclick="prepareNewTask()" id="plus-btn">+ បន្ថែមការងារ</button>
            <button onclick="cancelInput()" id="cancel-btn" style="display:none; background-color: #e74c3c;">បោះបង់</button>
        </div>
    </div>
</div>

<script>
    let activeProjectId = '';
    let currentTasks = [];

    async function loadProjects() {
        const res = await fetch('/get_projects');
        const data = await res.json();
        const list = document.getElementById('project-list');
        list.innerHTML = '';
        for (const p of data.projects) {
            const taskRes = await fetch(`/tasks?project_id=${p.id}`);
            const taskData = await taskRes.json();
            let tasks = taskData.tasks || [];
            tasks.sort((a, b) => (a.status === 'Done' ? -1 : 1) || parseInt(a.no) - parseInt(b.no));
            
            const card = document.createElement('div');
            card.className = 'project-card';
            card.onclick = () => openProject(p.id);
            card.innerHTML = `
                <h3>Sub: ${p.id}</h3>
                <p>កាលបរិច្ឆេទ: ${p.date || 'N/A'}</p>
                <table>
                    <thead><tr><th>No</th><th>Desc</th><th>Status</th></tr></thead>
                    <tbody>
                        ${tasks.map(t => `<tr><td>${t.no}</td><td>${t.description}</td><td>${t.status}</td></tr>`).join('') || '<tr><td colspan="3">No tasks</td></tr>'}
                    </tbody>
                </table>`;
            list.appendChild(card);
        }
    }

    async function openProject(id) {
        activeProjectId = id;
        document.getElementById('project-view').style.display = 'none';
        document.getElementById('task-view').style.display = 'block';
        document.getElementById('current-project-title').innerText = "Project: " + id;
        cancelInput(); 
        const res = await fetch(`/tasks?project_id=${id}`);
        const data = await res.json();
        currentTasks = data.tasks || [];
        renderTasks();
    }

    function renderTasks() {
        currentTasks.sort((a, b) => (a.status === 'Done' ? -1 : 1) || parseInt(a.no) - parseInt(b.no));
        const tbody = document.getElementById('task-table-body');
        tbody.innerHTML = currentTasks.map(t => `
            <tr>
                <td>${t.no}</td><td>${t.description}</td><td>${t.status}</td><td>${t.date}</td><td>${t.note}</td>
                <td><button onclick="editTask('${t.no}')" style="background-color: #f39c12; padding: 5px; width: auto;">Edit</button></td>
            </tr>
        `).join('');
    }

    // --- LOGIC FOR AUTO-SEQUENCE & INPUT ---

    function getNextSequenceNo() {
        if (currentTasks.length === 0) return 1;
        const nos = currentTasks.map(t => parseInt(t.no)).filter(n => !isNaN(n));
        return nos.length > 0 ? Math.max(...nos) + 1 : 1;
    }

    function clearInputs() {
        ['task-no', 'task-desc', 'task-date', 'task-note'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('task-status').value = 'Pending';
        // Auto-set today's date
        document.getElementById('task-date').value = new Date().toISOString().split('T')[0];
    }

    function prepareNewTask() {
        clearInputs();
        document.getElementById('task-no').value = getNextSequenceNo();
        showInputRow();
    }

    function editTask(no) {
        const task = currentTasks.find(t => t.no == no);
        if (!task) return;
        document.getElementById('task-no').value = task.no;
        document.getElementById('task-desc').value = task.description;
        document.getElementById('task-status').value = task.status;
        document.getElementById('task-date').value = task.date;
        document.getElementById('task-note').value = task.note;
        showInputRow();
    }

    async function saveTask() {
        const payload = {
            project_id: activeProjectId,
            no: document.getElementById('task-no').value,
            description: document.getElementById('task-desc').value,
            status: document.getElementById('task-status').value,
            date: document.getElementById('task-date').value,
            note: document.getElementById('task-note').value
        };
        await fetch('/tasks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        cancelInput();
        openProject(activeProjectId);
    }

    function showInputRow() {
        document.getElementById('input-row').style.display = 'table-row';
        document.getElementById('plus-btn').style.display = 'none';
        document.getElementById('cancel-btn').style.display = 'inline';
    }

    function cancelInput() {
        document.getElementById('input-row').style.display = 'none';
        document.getElementById('plus-btn').style.display = 'inline';
        document.getElementById('cancel-btn').style.display = 'none';
        clearInputs();
    }

    function showProjects() { 
        document.getElementById('project-view').style.display = 'block'; 
        document.getElementById('task-view').style.display = 'none'; 
        loadProjects();
    }

    function toggleProjectForm() { 
        const f = document.getElementById('project-form-container'); 
        f.style.display = (f.style.display === 'none') ? 'block' : 'none'; 
    }

    async function createProject() { 
        const id = document.getElementById('new_project_id').value;
        const date = document.getElementById('new_project_date').value;
        if(!id) return alert("Please enter Project ID");
        await fetch('/projects', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, date}) }); 
        loadProjects(); 
        toggleProjectForm(); 
    }

    window.onload = loadProjects;
</script>
</body>
</html>
