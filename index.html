<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធតាមដានការងារ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 10px; }
        .container { width: 100%; max-width: 900px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2980b9; color: white; }

        /* Buttons */
        button { padding: 8px 12px; border-radius: 4px; border: none; cursor: pointer; color: white; }
        .btn-new { background-color: #2980b9; width: 100%; margin-bottom: 10px; }
        .btn-save { background-color: #27ae60; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-edit { background-color: #2980b9; margin-right: 5px; }
        .btn-delete { background-color: #e74c3c; }
        
        .project-item { 
            padding: 12px; border: 1px solid #3498db; border-radius: 5px; 
            margin-bottom: 5px; cursor: pointer; background: #ebf5fb; font-weight: bold;
        }
        .project-item:hover { background: #d4e6f1; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div id="project-view">
        <h2>បញ្ជី Project</h2>
        <table>
            <thead>
                <tr><th>No</th><th>Desc</th><th>Status</th></tr>
            </thead>
            <tbody id="project-summary-body"></tbody>
        </table>
    </div>   

    <div id="task-view" style="display:none;">
        <button onclick="showProjects()">⬅️ ត្រឡប់ក្រោយ</button>
        <h2 id="current-project-title"></h2>
        <table>
            <thead>
                <tr><th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th><th>Action</th></tr>
            </thead>
            <tbody id="task-table-body"></tbody>
        </table>
        
        <div id="input-form">
            <input type="text" id="new-no" placeholder="No">
            <input type="text" id="new-description" placeholder="Desc">
            <select id="new-status"><option>Pending</option><option>Processing</option><option>Done</option></select>
            <input type="date" id="new-date">
            <input type="text" id="new-note" placeholder="Note">
            <button onclick="saveNewTask()" class="btn-save">Save/Update Task</button>
        </div>
    </div>
</div>

<script>
    let activeProjectId = '';
    let editingTaskId = null;

    // --- Project Logic ---
    function toggleProjectForm() {
        const el = document.getElementById('project-form-container');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function loadProjects() {
        const res = await fetch('/get_projects');
        const data = await res.json();
        const list = document.getElementById('project-list');
        list.innerHTML = '';
        data.projects.forEach(p => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = `${p.id} - ${p.date}`;
            div.onclick = () => selectProject(p.id);
            list.appendChild(div);
        });
    }

    function selectProject(projectId) {
        activeProjectId = projectId;
        document.getElementById('task-section').style.display = 'block';
        document.getElementById('current-project-title').innerText = "កិច្ចការក្នុង៖ " + projectId;
        loadTasks();
    }

    async function createProject() {
        const id = document.getElementById('new_project_id').value;
        const date = document.getElementById('new_project_date').value;
        if(!id) return alert("សូមដាក់ឈ្មោះ Project");
        await fetch('/projects', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id, date})
        });
        loadProjects();
    }

    // --- Task Logic ---
    async function loadTasks() {
        const res = await fetch(`/tasks?project_id=${activeProjectId}`);
        const data = await res.json();
        const tbody = document.getElementById('task-table-body');
        tbody.innerHTML = '';
        
        data.tasks.forEach(task => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${task.no}</td>
                <td>${task.description}</td>
                <td>${task.status}</td>
                <td>${task.date}</td>
                <td>
                    <button class="btn-edit" onclick='editTask(${JSON.stringify(task)})'>Edit</button>
                    <button class="btn-delete" onclick="deleteTask('${task.id}')">Del</button>
                </td>
            `;
        });
        resetFields();
    }

    function editTask(task) {
        editingTaskId = task.id;
        document.getElementById('new-no').value = task.no;
        document.getElementById('new-description').value = task.description;
        document.getElementById('new-status').value = task.status;
        document.getElementById('new-date').value = task.date;
        window.scrollTo(0, document.body.scrollHeight); // រំកិលចុះក្រោមទៅកន្លែងកែ
    }

    async function saveNewTask() {
        const taskData = {
            id: editingTaskId,
            project_id: activeProjectId,
            no: document.getElementById('new-no').value,
            description: document.getElementById('new-description').value,
            status: document.getElementById('new-status').value,
            date: document.getElementById('new-date').value
        };

        const endpoint = editingTaskId ? '/update_task' : '/tasks';
        await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(taskData)
        });

        editingTaskId = null;
        loadTasks();
    }

    async function deleteTask(taskId) {
        if(confirm("លុបការងារនេះ?")) {
            await fetch(`/delete_task/${taskId}`, { method: 'DELETE' });
            loadTasks();
        }
    }

    function resetFields() {
        document.getElementById('new-no').value = '';
        document.getElementById('new-description').value = '';
        document.getElementById('new-date').value = new Date().toISOString().split('T')[0];
    }

    window.onload = loadProjects;
</script>
</body>
</html>
