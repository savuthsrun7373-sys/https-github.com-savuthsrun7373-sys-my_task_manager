<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធតាមដានការងារ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .btn-primary { background-color: #2980b9; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .btn-save { background-color: #27ae60; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2980b9; color: white; }
        .project-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .project-card:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <section id="project-view">
        <h2>បញ្ជី Project</h2>
        <button class="btn-primary" onclick="toggleProjectForm()">+ New Project</button>
        <div id="project-form-container" class="hidden">
            <input type="text" id="new_project_id" placeholder="Project ID">
            <input type="date" id="new_project_date">
            <button class="btn-primary btn-save" onclick="createProject()">រក្សាទុក</button>
        </div>
        <div id="project-list" style="margin-top: 20px;"></div>
    </section>

    <section id="task-view" class="hidden">
        <button onclick="showProjects()">⬅️ ត្រឡប់ក្រោយ</button>
        <h2 id="current-project-title"></h2>
        <table>
            <thead>
                <tr><th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th><th>Action</th></tr>
            </thead>
            <tbody id="task-table-body"></tbody>
            <tr id="new-task-row" class="hidden">
                <td><input type="text" id="new-no" style="width: 50px;"></td>
                <td><input type="text" id="new-description"></td>
                <td>
                    <select id="new-status">
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Done">Done</option>
                    </select>
                </td>
                <td><input type="date" id="new-date"></td>
                <td><input type="text" id="new-note"></td>
            </tr>
        </table>
        <button id="plus-btn" style="margin-top: 10px;" onclick="toggleNewRow()">+</button>
        <button id="save-btn" class="hidden btn-save" onclick="saveNewTask()">Save/Update</button>
    </section>
</div>

<script>
    let activeProjectId = '';
    let currentTasks = [];

    // បង្ហាញ Project List
    async function loadProjects() {
        const res = await fetch('/get_projects');
        const data = await res.json();
        const list = document.getElementById('project-list');
        list.innerHTML = data.projects.map(p => `
            <div class="project-card" onclick="openProject('${p.id}')">
                <h3>Sub: ${p.id}</h3>
                <p>កាលបរិច្ឆេទ: ${p.date}</p>
            </div>
        `).join('');
    }

    // បើក Project ជាក់លាក់
    async function openProject(id) {
        activeProjectId = id;
        document.getElementById('project-view').classList.add('hidden');
        document.getElementById('task-view').classList.remove('hidden');
        document.getElementById('current-project-title').innerText = "Sub: " + id;
        
        const res = await fetch(`/tasks?project_id=${id}`);
        const data = await res.json();
        currentTasks = data.tasks || [];
        renderTasks();
    }

    // បង្ហាញតារាង Task
    function renderTasks() {
        const tbody = document.getElementById('task-table-body');
        currentTasks.sort((a, b) => (a.status === 'Done' ? 1 : -1) || a.no - b.no);
        tbody.innerHTML = currentTasks.map(t => `
            <tr>
                <td>${t.no}</td><td>${t.description}</td><td>${t.status}</td>
                <td>${t.date}</td><td>${t.note}</td>
                <td><button onclick="editTask('${t.no}')">Edit</button></td>
            </tr>
        `).join('');
    }

    // បន្ថែម/កែសម្រួល Task
    function toggleNewRow() {
        document.getElementById('new-task-row').classList.remove('hidden');
        document.getElementById('plus-btn').classList.add('hidden');
        document.getElementById('save-btn').classList.remove('hidden');
    }

    async function saveNewTask() {
        const payload = {
            project_id: activeProjectId,
            no: document.getElementById('new-no').value,
            description: document.getElementById('new-description').value,
            status: document.getElementById('new-status').value,
            date: document.getElementById('new-date').value,
            note: document.getElementById('new-note').value
        };
        await fetch('/tasks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        document.getElementById('new-task-row').classList.add('hidden');
        document.getElementById('save-btn').classList.add('hidden');
        document.getElementById('plus-btn').classList.remove('hidden');
        openProject(activeProjectId);
    }

    function showProjects() { 
        document.getElementById('project-view').classList.remove('hidden'); 
        document.getElementById('task-view').classList.add('hidden'); 
    }

    function toggleProjectForm() { document.getElementById('project-form-container').classList.toggle('hidden'); }

    window.onload = loadProjects;
</script>
</body>
</html>
