<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>ប្រព័ន្ធតាមដានការងារ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background: #2980b9; color: white; }
        #project-list { display: grid; gap: 10px; margin-top: 20px; }
        .project-card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        button { background: #2980b9; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="project-view">
        <h2>បញ្ជី Project</h2>
        <button onclick="toggleElement('project-form-container')">New_Project</button>
        <div id="project-form-container" style="display: none;">
            <input type="text" id="new_project_id" placeholder="Project ID">
            <input type="date" id="new_project_date">
            <button onclick="createProject()">រក្សាទុក</button>
        </div>
        <div id="project-list"></div>
    </div>

    <div id="task-view" style="display:none;">
        <button onclick="showView('project-view')">⬅️ ត្រឡប់ក្រោយ</button>
        <h2 id="current-project-title"></h2>
        <table>
            <thead>
                <tr><th>No</th><th>Desc</th><th>Status</th><th>Date</th><th>Note</th><th>Action</th></tr>
            </thead>
            <tbody id="task-table-body"></tbody>
            <tr id="new-task-row" style="display:none; background: #f9f9f9;">
                <td><input type="text" id="new-no"></td>
                <td><input type="text" id="new-description"></td>
                <td>
                    <select id="new-status">
                        <option>Pending</option><option>Processing</option><option>Done</option>
                    </select>
                </td>
                <td><input type="date" id="new-date"></td>
                <td><input type="text" id="new-note"></td>
            </tr>
        </table>
        <button onclick="toggleTaskForm(true)" id="plus-btn">+</button>
        <button onclick="saveNewTask()" id="save-btn" style="display:none; background: #27ae60;">Save/Update</button>
    </div>
</div>

<script>
    let activeProjectId = '';
    let currentTasks = [];

    // មុខងារជំនួយ (Helpers)
    const toggleElement = (id) => {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    };

    const showView = (view) => {
        document.getElementById('project-view').style.display = (view === 'project-view') ? 'block' : 'none';
        document.getElementById('task-view').style.display = (view === 'task-view') ? 'block' : 'none';
    };

    // មុខងារដោះស្រាយទិន្នន័យ
    async function loadProjects() {
        const res = await fetch('/get_projects');
        const data = await res.json();
        const list = document.getElementById('project-list');
        list.innerHTML = '';
        
        for (const p of data.projects) {
            const taskRes = await fetch(`/tasks?project_id=${p.id}`);
            const tData = await taskRes.json();
            renderProjectCard(p, tData.tasks || []);
        }
    }

    function renderProjectCard(p, tasks) {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.onclick = () => openProject(p.id);
        card.innerHTML = `
            <h3>Sub: ${p.id}</h3>
            <p>កាលបរិច្ឆេទ: ${p.date || 'N/A'}</p>
            <table>
                ${tasks.map(t => `<tr><td>${t.no}</td><td>${t.description}</td><td>${t.status}</td></tr>`).join('')}
            </table>
        `;
        document.getElementById('project-list').appendChild(card);
    }

    async function openProject(id) {
        activeProjectId = id;
        showView('task-view');
        document.getElementById('current-project-title').innerText = "Sub: " + id;
        const res = await fetch(`/tasks?project_id=${id}`);
        const data = await res.json();
        currentTasks = data.tasks || [];
        renderTasks();
    }

    function renderTasks() {
        currentTasks.sort((a, b) => (a.status === 'Done' ? -1 : 1));
        const tbody = document.getElementById('task-table-body');
        tbody.innerHTML = currentTasks.map(t => `
            <tr>
                <td>${t.no}</td><td>${t.description}</td><td>${t.status}</td>
                <td>${t.date}</td><td>${t.note}</td>
                <td><button onclick="editTask('${t.no}')">Edit</button></td>
            </tr>
        `).join('');
    }

    function toggleTaskForm(show) {
        document.getElementById('new-task-row').style.display = show ? 'table-row' : 'none';
        document.getElementById('plus-btn').style.display = show ? 'none' : 'inline';
        document.getElementById('save-btn').style.display = show ? 'inline' : 'none';
    }

    async function saveNewTask() {
        const payload = {
            project_id: activeProjectId,
            no: document.getElementById('new-no').value,
            description: document.getElementById('new-description').value,
            status: document.getElementById('new-status').value,
            date: document.getElementById('new-date').value,
            note: document.getElementById('new-note').value
        };
        await fetch('/tasks', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(payload) 
        });
        toggleTaskForm(false);
        openProject(activeProjectId);
    }

    window.onload = loadProjects;
</script>
</body>
</html>
